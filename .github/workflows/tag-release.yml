name: Tag & Draft Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build version tag
        id: tag
        run: |
          VERSION=$(grep -m1 'version:' mix.exs | sed 's/.*version: "\(.*\)".*/\1/')
          STAGE=$(cat RELEASE_STAGE 2>/dev/null | tr -d '[:space:]')
          if [ -z "$STAGE" ]; then STAGE="α"; fi
          TAG="v${VERSION}-${STAGE}+build.${{ github.run_number }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --draft \
            --prerelease \
            --title "${{ steps.tag.outputs.tag }}" \
            --generate-notes
